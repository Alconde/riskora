{% extends 'base.html' %}

{% block title %}Eliminar accidente | Riskora{% endblock %}
{% block page_title %}Eliminar accidente{% endblock %}

{% block content %}
<div class="card">
    <div style="text-align:center;padding:30px;">
        <h3 style="color:#dc2626;margin-bottom:12px;">¿Eliminar este accidente?</h3>
        <p class="meta" style="margin-bottom:16px;">Se eliminara el registro <strong>{{ object.codigo }}</strong> permanentemente.</p>
        <form method="post" style="display:flex;justify-content:center;gap:10px;">
            {% csrf_token %}
            <button type="submit" class="hero-btn hero-btn-primary" style="background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;">Eliminar</button>
            <a href="{% url 'incidents:accidente-detail' object.pk %}" class="hero-btn hero-btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
