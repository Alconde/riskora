{% extends 'base.html' %}
{% block title %}Eliminar Control | Riskora{% endblock %}
{% block page_title %}Eliminar Control de Salud{% endblock %}

{% block content %}
<div class="card" style="max-width:500px;">
    <p style="margin-bottom:16px;">¿Estás seguro de eliminar este control de salud?</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex gap-2">
            <button type="submit" class="hero-btn hero-btn--danger">Eliminar</button>
            <a href="{% url 'health_surveillance:controles' %}" class="hero-btn hero-btn--secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
